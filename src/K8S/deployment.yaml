apiVersion: apps/v1
kind: Deployment
metadata:
  name: atpl-demo-deployment
  labels:
    app: atpl-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atpl-demo
  template:
    metadata:
      labels:
        app: atpl-demo
    spec:
      containers:
        - name: atpl-demo
          image: nani682/atpl-demo:1.0
          ports:
            - containerPort: 9090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /demo/actuator/health
              port: 9090
            initialDelaySeconds: 120   # ← Increased
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /demo/actuator/health
              port: 9090
            initialDelaySeconds: 90    # ← Increased
            periodSeconds: 10
            failureThreshold: 5